<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - VishinghSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #e0e5ec; color: #444; padding: 20px; }
        
        .contact-card { 
            background: #e0e5ec; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 9px 9px 16px #babecc, -9px -9px 16px #ffffff; 
            max-width: 500px; 
            margin: 40px auto; 
        }

        h2 { color: #4caf50; text-align: center; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #e0e5ec;
            box-shadow: inset 3px 3px 6px #babecc, inset -3px -3px 6px #ffffff;
            font-family: inherit;
        }

        textarea { height: 100px; resize: none; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: #4caf50;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .submit-btn:hover { background: #45a049; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #4caf50; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Contact VishinghSoft</h2>
        
        <form action="https://formsubmit.co/contact.vishinghsoft@gmail.com" method="POST">
            
            <input type="hidden" name="_captcha" value="false">
            

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" placeholder="Type your message here..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
