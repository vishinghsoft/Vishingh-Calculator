<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect - VishinghSoft</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .connect-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(145deg, var(--bg-color), #f0f5ff);
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .v-logo-img {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 5px 5px 15px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }
        .social-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 25px;
        }
        .social-link-btn {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-color);
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: 0.3s;
        }
        .social-link-btn:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            transform: translateY(2px);
        }
        .icon-box { margin-right: 15px; font-size: 24px; }
        .tagline { font-size: 11px; color: #888; font-weight: 400; }
        .footer-text { text-align: center; font-size: 11px; margin-top: 30px; color: #aaa; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="app-title">Business Connect</span>
        <span class="theme-btn" onclick="location.href='index.html'">🏠</span>
    </div>

    <div class="connect-header">
        <img src="vs.png" alt="VishinghSoft Logo" class="v-logo-img">
        <h2>VishinghSoft</h2>
        <p>Innovating the Future of Software</p>
    </div>

    <div class="container">
        <div class="social-grid">
            <a href="https://github.com/vishinghsoft/Vishingh-Calculator-All-In-One-Calculator-" target="_blank" class="social-link-btn">
                <span class="icon-box">🐙</span>
                <div>
                    <div>Source Code (GitHub)</div>
                    <div class="tagline">Check this app's repo</div>
                </div>
            </a>

            <a href="https://instagram.com/vishinghsoft" target="_blank" class="social-link-btn">
                <span class="icon-box">📸</span>
                <div>
                    <div>Official Instagram</div>
                    <div class="tagline">Follow @vishinghsoft</div>
                </div>
            </a>

            <a href="mailto:contact.vishinghsoft@gmail.com" class="social-link-btn">
                <span class="icon-box">📧</span>
                <div>
                    <div>Email Us</div>
                    <div class="tagline">For business inquiries</div>
                </div>
            </a>
        </div>
        
        <p class="footer-text">
            © 2026 VISHINGHSOFT | BUILT FOR FUTURE
        </p>
    </div>

</body>
</html>
